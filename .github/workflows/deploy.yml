name: Build and Deploy to Azure
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_APP_TITLE="My Deployed React App"\
            -t ${{ secrets.ACR_LOGIN_SERVER }}/my-react-app:${{ github.sha }} . 
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/my-react-app:${{ github.sha }}

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name my-react-docker-demo-syafiq \
            --resource-group rg-react-docker-demo \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/my-react-app:${{ github.sha }} \
            --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}
